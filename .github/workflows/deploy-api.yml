name: Deploy API

on:
  push:
    tags:
      - 'api-v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read API version
        id: version
        run: echo "value=$(node -p "require('./src/api/package.json').version")" >> $GITHUB_OUTPUT

      - name: Typecheck
        run: pnpm --filter @system-builder/api typecheck

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter @system-builder/api wrangler deploy --var "API_VERSION:${{ steps.version.outputs.value }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
